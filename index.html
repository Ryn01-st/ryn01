<!DOCTYPE html>

<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Ultimate AI Intro</title>

<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
  font-family: Arial, sans-serif;
}

.banner {
  position: relative;
  width: 100%;
  height: 100vh;
}

/* nền */
.banner::before {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: url("https://raw.githubusercontent.com/Ryn01-st/ryn01/main/trangchu1.png") center/cover no-repeat;
  filter: brightness(0.4);
  animation: zoomBg 12s infinite alternate;
}

@keyframes zoomBg {
  from { transform: scale(1); }
  to { transform: scale(1.1); }
}

/* overlay */
.overlay {
  position: absolute;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle, transparent 40%, rgba(0,0,0,0.9));
}

/* title */
.title {
  position: absolute;
  top: 50%;
  width: 100%;
  text-align: center;
  font-size: 60px;
  font-weight: bold;
  opacity: 0;
  transform: translateY(-50%) scale(0.8);

  background: linear-gradient(90deg, #00eaff, #00ffcc, #00eaff);
  -webkit-background-clip: text;
  color: transparent;

  text-shadow: 0 0 20px #00eaff;

  animation: showTitle 2s forwards;
}

@keyframes showTitle {
  to {
    opacity: 1;
    transform: translateY(-50%) scale(1.1);
  }
}

/* nút nhạc */
.music-btn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: rgba(0,0,0,0.6);
  color: white;
  border: none;
  padding: 10px;
  border-radius: 10px;
  cursor: pointer;
}
</style>

</head>

<body>

<div class="banner">
  <canvas id="particles"></canvas>
  <div class="overlay"></div>

  <div class="title" id="mainTitle">
    ỨNG DỤNG AI<br>TRONG HỌC TẬP 🚀
  </div>
</div>

<audio id="music" loop>
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-5.mp3">
</audio>

<button class="music-btn" onclick="toggleMusic()">🔊</button>

<script>
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];
let textPositions = [];
let phase = 0; // 0 = bay, 1 = tụ, 2 = nổ

// tạo chữ AI
const offCanvas = document.createElement("canvas");
const offCtx = offCanvas.getContext("2d");

offCanvas.width = canvas.width;
offCanvas.height = canvas.height;

offCtx.fillStyle = "white";
offCtx.font = "bold 200px Arial";
offCtx.textAlign = "center";
offCtx.fillText("AI", canvas.width/2, canvas.height/2);

const data = offCtx.getImageData(0,0,canvas.width,canvas.height).data;

for (let y = 0; y < canvas.height; y+=6) {
  for (let x = 0; x < canvas.width; x+=6) {
    let index = (y*canvas.width + x)*4;
    if (data[index+3] > 128) {
      textPositions.push({x,y});
    }
  }
}

// particles
for (let i=0;i<textPositions.length;i++){
  particles.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    targetX: textPositions[i].x,
    targetY: textPositions[i].y
  });
}

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  particles.forEach(p=>{
    if (phase === 0){
      p.x += (Math.random()-0.5)*5;
      p.y += (Math.random()-0.5)*5;
    }
    if (phase === 1){
      p.x += (p.targetX - p.x)*0.05;
      p.y += (p.targetY - p.y)*0.05;
    }
    if (phase === 2){
      p.x += (Math.random()-0.5)*15;
      p.y += (Math.random()-0.5)*15;
    }

    ctx.beginPath();
    ctx.arc(p.x,p.y,2,0,Math.PI*2);
    ctx.fillStyle = "#00ffff";
    ctx.shadowColor = "#00ffff";
    ctx.shadowBlur = 10;
    ctx.fill();
  });

  requestAnimationFrame(animate);
}

animate();

// timeline
setTimeout(()=> phase=1, 2000); // tụ thành AI
setTimeout(()=> phase=2, 4500); // nổ
setTimeout(()=> {
  document.getElementById("mainTitle").style.opacity = 1;
}, 5000);

// music
let music = document.getElementById("music");
let played = false;

document.body.addEventListener("click", ()=>{
  if(!played){
    music.play();
    played=true;
  }
}, {once:true});

function toggleMusic(){
  if(music.paused) music.play();
  else music.pause();
}
</script>

</body>
</html>
