<!DOCTYPE html>

<html lang="vi">
<head>
<meta charset="UTF-8">
<title>AI Intro Cinematic</title>

<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
  font-family: Arial, sans-serif;
}

/* ===== BACKGROUND ===== */
.banner {
  position: relative;
  width: 100%;
  height: 100vh;
}

.banner::before {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: url("https://github.com/Ryn01-st/ryn01/blob/main/trangchu1.png") center/cover no-repeat;
  filter: brightness(0.4) blur(2px);
}

/* ===== EDGE FADE ===== */
.edge-fade {
  position: absolute;
  width: 100%;
  height: 100%;

  background:
    radial-gradient(circle at center,
      transparent 20%,
      rgba(0,0,0,0.5) 50%,
      rgba(0,0,0,0.95) 85%
    );

  animation: openScene 2.5s ease forwards;
}

@keyframes openScene {
  from {
    background: radial-gradient(circle at center, black 0%, black 100%);
  }
  to {
    background:
      radial-gradient(circle at center,
        transparent 20%,
        rgba(0,0,0,0.5) 50%,
        rgba(0,0,0,0.95) 85%
      );
  }
}

/* ===== LIGHT SWEEP ===== */
.light {
  position: absolute;
  width: 200%;
  height: 100%;
  background: linear-gradient(
    120deg,
    transparent 40%,
    rgba(255,255,255,0.15),
    transparent 60%
  );
  animation: sweep 6s linear infinite;
}

@keyframes sweep {
  0% { transform: translateX(-100%); }
  100% { transform: translateX(100%); }
}

/* ===== TEXT ===== */
.title {
  position: absolute;
  top: 45%;
  width: 100%;
  text-align: center;

  font-size: 65px;
  font-weight: 900;
  color: white;

  text-shadow:
    0 0 10px #00eaff,
    0 0 40px #00eaff,
    0 0 80px #0088ff;

  opacity: 0;
  transform: scale(0.8);

  animation: showTitle 3s ease forwards;
  animation-delay: 1.5s;
}

@keyframes showTitle {
  0% {
    opacity: 0;
    transform: scale(0.7) translateY(50px);
    filter: blur(10px);
  }
  100% {
    opacity: 1;
    transform: scale(1.05);
    filter: blur(0);
  }
}

/* ===== PARTICLES ===== */
canvas {
  position: absolute;
  top: 0;
  left: 0;
}

/* ===== MUSIC BUTTON ===== */
.music-btn {
  position: fixed;
  bottom: 20px;
  right: 20px;

  width: 55px;
  height: 55px;

  background: rgba(0,0,0,0.6);
  color: white;

  border: none;
  border-radius: 50%;

  font-size: 24px;
  cursor: pointer;

  display: flex;
  align-items: center;
  justify-content: center;

  box-shadow: 0 0 15px rgba(0,255,255,0.5);
}
</style>

</head>

<body>

<div class="banner">
  <canvas id="particles"></canvas>
  <div class="edge-fade"></div>
  <div class="light"></div>

  <div class="title">
    FEEDBACKS & COMMENTS
  </div>
</div>

<!-- 🎵 NHẠC -->

<audio id="music" loop preload="auto">
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<button class="music-btn" id="musicBtn">🔇</button>

<script>
// ===== PARTICLES =====
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

function resizeCanvas(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

let particles = [];

for (let i = 0; i < 80; i++) {
  particles.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    size: Math.random() * 2,
    speedX: (Math.random() - 0.5),
    speedY: (Math.random() - 0.5)
  });
}

function animateParticles() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  particles.forEach(p => {
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fillStyle = "rgba(0,255,255,0.7)";
    ctx.fill();

    p.x += p.speedX;
    p.y += p.speedY;

    if (p.x < 0 || p.x > canvas.width) p.speedX *= -1;
    if (p.y < 0 || p.y > canvas.height) p.speedY *= -1;
  });

  requestAnimationFrame(animateParticles);
}
animateParticles();

// ===== MUSIC =====
const music = document.getElementById("music");
const btn = document.getElementById("musicBtn");

let isPlaying = false;

// fade-in nhẹ
function fadeInMusic() {
  music.volume = 0;
  let v = 0;

  let fade = setInterval(() => {
    v += 0.01;
    if (v >= 0.2) {
      v = 0.2;
      clearInterval(fade);
    }
    music.volume = v;
  }, 120);
}

// click đầu tiên
document.addEventListener("click", () => {
  if (!isPlaying) {

    music.addEventListener("loadedmetadata", () => {

      music.currentTime = music.duration * 0.25; // bắt đầu từ 1/4

      music.play().then(() => {
        fadeInMusic();
        btn.textContent = "🔊";
        isPlaying = true;
      });

    }, { once: true });

  }
}, { once: true });

// toggle
btn.addEventListener("click", (e) => {
  e.stopPropagation();

  if (music.paused) {
    music.play();
    btn.textContent = "🔊";
  } else {
    music.pause();
    btn.textContent = "🔇";
  }
});
</script>

</body>
</html>
