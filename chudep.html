<!DOCTYPE html>

<html lang="vi">
<head>
<meta charset="UTF-8">
<title>AI Intro Pro</title>

<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
  font-family: Arial, sans-serif;
}

.banner {
  position: relative;
  width: 100%;
  height: 100vh;
}

/* ✅ ẢNH CHẠY 100% (từ GitHub repo) */
.banner::before {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: url("trangchu2.png") center/cover no-repeat;
  filter: brightness(0.45) blur(1px);
}

/* overlay */
.overlay {
  position: absolute;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle, transparent 40%, rgba(0,0,0,0.85));
}

/* text */
.title {
  position: absolute;
  top: 45%;
  width: 100%;
  text-align: center;
  color: white;
  font-size: 60px;
  font-weight: bold;

  text-shadow:
    0 0 10px #00eaff,
    0 0 30px #00eaff;

  animation: showTitle 3s ease forwards;
}

@keyframes showTitle {
  from {
    opacity: 0;
    transform: scale(0.7);
  }
  to {
    opacity: 1;
    transform: scale(1.1);
  }
}

/* particles */
canvas {
  position: absolute;
  top: 0;
  left: 0;
}

/* button */
.music-btn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: rgba(0,0,0,0.6);
  color: white;
  border: none;
  padding: 10px 15px;
  border-radius: 10px;
  cursor: pointer;
}
</style>

</head>

<body>

<div class="banner">
  <canvas id="particles"></canvas>
  <div class="overlay"></div>

  <div class="title">
    ỨNG DỤNG AI<br>TRONG HỌC TẬP 🚀
  </div>
</div>

<audio id="music" loop>
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-5.mp3">
</audio>

<button class="music-btn" onclick="toggleMusic()">🔊</button>

<script>
// particles
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for (let i = 0; i < 80; i++) {
  particles.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    size: Math.random() * 2,
    speedX: (Math.random() - 0.5),
    speedY: (Math.random() - 0.5)
  });
}

function animateParticles() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  particles.forEach(p => {
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fillStyle = "rgba(0,255,255,0.7)";
    ctx.fill();

    p.x += p.speedX;
    p.y += p.speedY;

    if (p.x < 0 || p.x > canvas.width) p.speedX *= -1;
    if (p.y < 0 || p.y > canvas.height) p.speedY *= -1;
  });

  requestAnimationFrame(animateParticles);
}

animateParticles();

// music
let isPlaying = false;
const music = document.getElementById("music");

document.addEventListener("click", () => {
  if (!isPlaying) {
    music.play();
    isPlaying = true;
  }
});

function toggleMusic() {
  if (isPlaying) music.pause();
  else music.play();
  isPlaying = !isPlaying;
}
</script>

</body>
</html>
